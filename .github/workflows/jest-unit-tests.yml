name: Jest unit tests
# Runs on a GitHub-hosted runner. Previously targeted a self-hosted `ARM64`
# label that does not exist on the thorvath fork, so the `jest-unit-tests`
# check sat "pending" forever and blocked every PR. The suite runs natively
# (npm ci + npm test) — no Docker is required, mesh build + jest run directly
# on the hosted runner.
on:
  push:
  pull_request:

jobs:
  jest-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
