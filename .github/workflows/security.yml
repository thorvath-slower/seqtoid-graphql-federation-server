name: security

# Security scanning suite (improvement-#010 / CZID-137) for the Node/TypeScript
# GraphQL federation server. First scanning pass on this repo, so the noisy
# scanners run in REPORT mode (surface, don't block) and ratchet to hard-fail as
# findings clear; secret scanning hard-fails (unambiguous).
#   - gitleaks  : secrets across git history — HARD-FAIL (FPs → .gitleaks.toml)
#   - trivy     : deps/CVE + Dockerfile misconfig + secret (fs) — REPORT ONLY
#   - codeql    : JavaScript/TypeScript SAST — results to the Security tab
#   - npm-audit : dependency advisories — REPORT ONLY
# Action pins follow the CZID-98 hardening lessons (trivy-action v0.36.0 — NOT the
# non-existent 0.28.0; gitleaks >= 8.30.1).
#
# NOTE: Actions are currently DISABLED on the thorvath fork (the jest job targets
# an absent self-hosted ARM64 runner), so this suite is dormant until Actions are
# re-enabled and that trigger is gated. Validated locally meanwhile (CZID-137).

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secrets, hard-fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Scan git history for secrets
        run: gitleaks git . --redact --no-banner --exit-code 1

  trivy:
    name: trivy fs (vuln/misconfig/secret, report only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0 # TODO(CZID-137): ratchet to 1 once the backlog is triaged

  codeql:
    name: CodeQL (JS/TS SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  npm-audit:
    name: npm audit (advisories, report only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: npm audit (production dependencies)
        run: npm audit --omit=dev # TODO(CZID-137): currently report-only; runner does not fail the job
        continue-on-error: true
